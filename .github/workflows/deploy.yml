# Production deploy with prerendered public routes.
#
# Why this is a separate workflow from ci.yml: ci.yml is verification-only and
# must never deploy. The piece it cannot do is the browser-based prerender. The
# public marketing/legal routes ship as an empty `<div id="root">` SPA shell, so
# crawlers that don't run JS (Perplexity, many GPTBot/ClaudeBot fetches, RAG
# ingestion) see no body content. scripts/prerender.mjs boots the built app in
# headless Chromium and writes the rendered HTML back into dist/, but it needs
# `playwright install --with-deps chromium`, which the Cloudflare Pages git-build
# image (non-root) cannot run. So deployment moves here: this job installs
# Chromium, runs `build:prerender`, and uploads the prerendered dist/ to
# Cloudflare Pages via wrangler (direct upload) instead of letting CF build on
# its own. See quantive-app/scripts/prerender.mjs and the feature-wishlist entry
# "Re-enable prerendering of public routes for AI crawlers".
#
# It triggers AFTER ci.yml succeeds on main, so a red build never deploys, and it
# deploys the exact commit ci verified (head_sha). Manual runs (workflow_dispatch)
# deploy current main HEAD.
#
# Cloudflare Pages is on Direct Upload (git integration disconnected), so this
# workflow is the only deploy path. DEPLOY_ENABLED == 'true' gates the job as a
# kill switch — set it to anything else to pause deploys without deleting config.
#
# Required GitHub configuration (Settings > Secrets and variables > Actions):
#   - Secrets:   CLOUDFLARE_API_TOKEN (Pages:Edit), CLOUDFLARE_ACCOUNT_ID,
#                VITE_POSTHOG_KEY
#   - Variables: CF_PAGES_PROJECT, DEPLOY_ENABLED=true, VITE_SUPABASE_URL,
#                VITE_SUPABASE_PUBLISHABLE_KEY, VITE_TURNSTILE_SITE_KEY,
#                VITE_POSTHOG_HOST
# The VITE_* values must mirror the production bundle config (see the build step):
# the build runs here, not on Cloudflare, so a missing one ships a blank site.

name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, prerender, deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    # Only when explicitly enabled, and either a manual run or a successful ci
    # run on a push to main. PR-triggered ci runs are ignored.
    if: >-
      ${{ vars.DEPLOY_ENABLED == 'true'
          && (github.event_name == 'workflow_dispatch'
              || (github.event.workflow_run.conclusion == 'success'
                  && github.event.workflow_run.event == 'push'
                  && github.event.workflow_run.head_branch == 'main')) }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Deploy the exact commit ci verified on a workflow_run trigger; fall
          # back to the dispatched ref for manual runs.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Chromium plus its apt shared libraries — the bit the Cloudflare build
      # image can't do, and the whole reason prerender lives here.
      - run: npx playwright install --with-deps chromium

      # vite build (incl. the seo-route-html plugin for per-route <head>) then
      # the browser prerender that fills in each public route's <body>.
      #
      # The VITE_* values MUST be present at build time — Vite inlines them into
      # the bundle. Without them the app throws "Supabase configuration missing"
      # on boot, so the prerender snapshot AND the live SPA both render a blank
      # page. They are public, client-exposed values (they ship in the bundle),
      # so they live as repo Variables (Settings > Secrets and variables >
      # Actions > Variables), not Secrets. Mirror the Cloudflare Pages project's
      # Production environment variables exactly.
      - name: Build and prerender
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.VITE_POSTHOG_HOST }}
        run: npm run build:prerender

      # Safety net: a missing VITE_* var (or any other prerender failure) yields
      # an empty <div id="root"></div> shell. Refuse to deploy that — it would
      # blank the live site, not just the crawler HTML.
      - name: Assert prerender produced real content
        run: |
          if ! grep -q '<h1' dist/index.html; then
            echo "::error::dist/index.html has no <h1> — prerender produced an empty shell, likely missing VITE_* build variables. Refusing to deploy."
            exit 1
          fi
          echo "Prerender content check passed."

      - name: Deploy prerendered dist to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main
