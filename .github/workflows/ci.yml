# Verification-only CI. Mirrors the gates already enforced locally by
# .husky/pre-push, so any internal push that uses --no-verify and every
# external pull request still gets the same signal before merge.
#
# IMPORTANT: this workflow does NOT deploy. Keep it strictly read-only.
# Deployment is owned by deploy.yml, which runs after this workflow succeeds on
# main, prerenders the public routes (headless Chromium — impossible inside the
# Cloudflare build image), and uploads dist/ via wrangler. Once that cutover is
# enabled, Cloudflare Pages' own git integration is disconnected, so nothing here
# should ever build-and-ship; this workflow only produces the green/red signal
# deploy.yml gates on.
#
# Skips playwright (test:e2e) because the suite needs a running dev server
# plus per-browser binaries and would more than double CI time. Husky still
# runs it locally via `npm run test:all`.

name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - run: npm run size:check
