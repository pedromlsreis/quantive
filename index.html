     If you ever add a localised UI, swap the static `lang` below for a
     dynamic value driven by the active route/locale. -->

          "name": "Quantive",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web browser",
          "url": "https://usequantive.app",
          "description": "Track your net worth across accounts and currencies, analyse asset allocation, and forecast your financial future. End-to-end encrypted — your data never leaves your device unencrypted. No bank connections required.",
          "featureList": [
            "Net worth tracking with unlimited sources",

            "Multi-currency support",

            "End-to-end encryption (XChaCha20-Poly1305)",
            "No bank connection required",
            "No tracking, no ads",

          ],
          "offers": [
            {
              "@type": "Offer",
              "name": "Free",
              "price": "0",
              "priceCurrency": "EUR",
              "description": "Net worth tracking with unlimited sources, allocation charts, multi-currency display, spreadsheet import, and end-to-end encrypted cloud sync. Free forever, no credit card required."
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "90",

          ],
          "publisher": {
            "@id": "https://usequantive.app/#organization"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://usequantive.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is Quantive?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive is a privacy-first personal finance app for tracking your net worth, analysing asset allocation, and forecasting your financial future. It works without connecting to your bank — you add balances manually or import from a spreadsheet, and all data is end-to-end encrypted before it ever leaves your device."
              }
            },
            {
              "@type": "Question",
              "name": "Is Quantive free?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. The Free plan is free forever with no credit card required. It includes net worth tracking with unlimited sources, allocation charts, multi-currency display, spreadsheet import, and end-to-end encrypted cloud sync. A Pro plan at €90/year (or €9/month) is coming soon with forecasting, full history, and export features."
              }
            },
            {
              "@type": "Question",
              "name": "Does Quantive connect to my bank?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. Quantive never connects to your bank and never asks for bank credentials. You enter balances manually or import them from a spreadsheet. This is a deliberate design choice to maximise privacy and keep your banking credentials completely separate from any third-party service."
              }
            },
            {
              "@type": "Question",
              "name": "How does Quantive protect my financial data?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive encrypts your data on your device before it ever reaches the server, using XChaCha20-Poly1305 for encryption and Argon2id for password-based key derivation (via libsodium). The server only ever stores ciphertext — even Quantive staff cannot read your financial data. A full database leak would reveal nothing about your finances."
              }
            },
            {
              "@type": "Question",
              "name": "What happens if I forget my password?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Because Quantive uses true end-to-end encryption, a forgotten password cannot be reset by Quantive. If you set up a 24-word BIP-39 recovery code during sign-up, you can use it to regain access. Without a recovery code, your encrypted data is permanently unrecoverable — this is a property of true end-to-end encryption, not a bug."
              }
            },
            {
              "@type": "Question",
              "name": "What currencies does Quantive support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive supports multi-currency display across major world currencies including EUR, USD, GBP, JPY, CHF, and more. You can track assets denominated in any supported currency and view your total net worth converted to your preferred display currency at historically accurate rates."
              }
            },
            {
              "@type": "Question",
              "name": "Can I import my spreadsheet into Quantive?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Spreadsheet import is included on the Free plan. If you already track your net worth in a spreadsheet, you can import it directly into Quantive without recreating everything from scratch."
              }
            },
            {
              "@type": "Question",
              "name": "Who is Quantive for?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive is designed for self-directed individuals who want a clear view of their wealth without sharing bank credentials: young professionals building wealth, investors tracking performance across multiple accounts and brokers, globally mobile people holding assets across currencies and borders, and anyone who values financial clarity and data privacy."
              }
            },
            {
              "@type": "Question",
              "name": "Is the Quantive app secure?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Quantive uses client-side end-to-end encryption, meaning your financial data is encrypted in your browser before syncing. The encryption stack — XChaCha20-Poly1305 and Argon2id via libsodium — is open source and publicly auditable on GitHub. The server stores only ciphertext and cannot decrypt your data."
              }
            }
          ]
        }
      ]
    }
    </script>

  </head>
