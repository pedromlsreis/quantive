<!doctype html>
<!-- App UI is deliberately English-only. The legal pages embed German
     statutory text (§ 19 UStG, Verbraucherschlichtungsstelle, Muster-
     Widerrufsformular); those blocks are wrapped in `<div lang="de">`
     inside docs/legal/ so screen readers switch pronunciation correctly.
     If you ever add a localised UI, swap the static `lang` below for a
     dynamic value driven by the active route/locale. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2ba688" />

    <title>Quantive - See Your Financial Life Clearly</title>

    <meta name="description" content="A privacy-first finance cockpit. Upload your spreadsheet, track net worth, analyse allocations, and forecast your future. Free forever.">
    <meta name="author" content="Quantive" />

    <!-- Brand fonts are self-hosted via @fontsource and imported from
         src/main.tsx so the first paint does not block on a Google Fonts
         round-trip. Keep them out of the document <head>. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="canonical" href="https://usequantive.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Quantive" />
    <meta property="og:url" content="https://usequantive.app" />
    <meta property="og:title" content="Quantive - See Your Financial Life Clearly" />
    <meta property="og:description" content="A privacy-first finance cockpit. Upload your spreadsheet, track net worth, analyse allocations, and forecast your future. Free forever." />
    <meta property="og:image" content="https://usequantive.app/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://usequantive.app/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quantive forecast view - projected net worth trajectory with a confidence cone and three percentile outcomes." />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quantive - See Your Financial Life Clearly" />
    <meta name="twitter:description" content="A privacy-first finance cockpit. Upload your spreadsheet, track net worth, analyse allocations, and forecast your future. Free forever." />
    <meta name="twitter:image" content="https://usequantive.app/og-image.jpg" />
    <meta name="twitter:image:alt" content="Quantive forecast view - projected net worth trajectory with a confidence cone and three percentile outcomes." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://usequantive.app/#website",
          "name": "Quantive",
          "url": "https://usequantive.app",
          "description": "A privacy-first finance cockpit for tracking net worth, analysing asset allocation, and forecasting your financial future.",
          "inLanguage": "en-US"
        },
        {
          "@type": "Organization",
          "@id": "https://usequantive.app/#organization",
          "name": "Quantive",
          "url": "https://usequantive.app",
          "logo": {
            "@type": "ImageObject",
            "url": "https://usequantive.app/logo.png",
            "width": 512,
            "height": 512
          },
          "description": "Privacy-first personal finance tool for tracking net worth, asset allocation, and wealth forecasting.",
          "email": "hello@usequantive.app",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Lützowstraße 31",
            "addressLocality": "Düsseldorf",
            "postalCode": "40476",
            "addressCountry": "DE"
          },
          "founder": {
            "@type": "Person",
            "name": "Pedro Reis"
          },
          "sameAs": ["https://github.com/pedromlsreis/quantive"]
        },
        {
          "@type": "SoftwareApplication",
          "@id": "https://usequantive.app/#software",
          "name": "Quantive",
          "applicationCategory": "FinanceApplication",
          "operatingSystem": "Web browser",
          "url": "https://usequantive.app",
          "description": "Track your net worth across accounts and currencies, analyse asset allocation, and forecast your financial future. End-to-end encrypted - your data never leaves your device unencrypted. No bank connections required.",
          "featureList": [
            "Net worth tracking with unlimited sources",
            "Allocation analysis (volatility and liquidity)",
            "Wealth forecasting with CAGR projections",
            "Multi-currency support",
            "Spreadsheet import (.xlsx)",
            "End-to-end encryption (XChaCha20-Poly1305)",
            "No bank connection required",
            "No tracking, no ads",
            "Cloud sync"
          ],
          "offers": [
            {
              "@type": "Offer",
              "name": "Free",
              "price": "0",
              "priceCurrency": "EUR",
              "description": "Net worth tracking with unlimited sources, allocation charts, multi-currency display, spreadsheet import, and end-to-end encrypted cloud sync. Free forever, no credit card required."
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "90",
              "priceCurrency": "EUR",
              "description": "Full historical view, forecasting engine with 95% confidence intervals, milestone and goal tracking, benchmark comparison, Excel/CSV export, PDF wealth report, and priority support."
            }
          ],
          "publisher": {
            "@id": "https://usequantive.app/#organization"
          }
        },
        {
          "@type": "FAQPage",
          "@id": "https://usequantive.app/#faq",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is Quantive?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive is a privacy-first personal finance cockpit. Track net worth, analyse asset allocations, and forecast future wealth, without connecting to your bank or sharing your financial data with anyone."
              }
            },
            {
              "@type": "Question",
              "name": "Is Quantive free to use?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Core features are free forever with no credit card required. A Pro plan with milestones, benchmark comparison, a month-by-month summary table, and a PDF wealth report is available at €9/month or €90/year."
              }
            },
            {
              "@type": "Question",
              "name": "How does Quantive protect my financial data?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "All data is encrypted on your device using end-to-end encryption before it ever reaches Quantive's servers. Quantive cannot read your financial information. Only you hold the decryption key."
              }
            },
            {
              "@type": "Question",
              "name": "Does Quantive connect to my bank?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. Quantive never connects to your bank accounts or requests login credentials. You enter balances manually from the dashboard, or import them from an existing spreadsheet."
              }
            },
            {
              "@type": "Question",
              "name": "Can I import my existing spreadsheet?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Yes. Spreadsheet import is included in the free plan. Upload your existing spreadsheet and your historical balance data is preserved in Quantive."
              }
            },
            {
              "@type": "Question",
              "name": "What currencies does Quantive support?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Quantive supports multiple display currencies including EUR, USD, GBP, JPY, CHF, and more. You can hold assets in any of them and view your full portfolio in your preferred currency."
              }
            },
            {
              "@type": "Question",
              "name": "What's included in Quantive Pro?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Pro adds full history across all snapshots, CAGR forecasting with 95% confidence bands, milestone and goal tracking, benchmark comparisons (vs. S&P 500 and inflation; MSCI World coming soon), a month-by-month summary table, a PDF wealth report, and Excel and CSV export. Priority support is included."
              }
            },
            {
              "@type": "Question",
              "name": "What if I lose access to my account?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "During cloud sync setup, Quantive issues a 24-word recovery phrase (BIP-39 mnemonic). Storing it safely lets you recover your encrypted data even if you lose account access."
              }
            }
          ]
        }
      ]
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
